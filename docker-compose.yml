services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: advisor-pg
    environment:
      POSTGRES_USER: advisor
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: advisor
    ports:
      - "5432:5432"
    volumes:
      - advisor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advisor -d advisor"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  advisor_pgdata:
